# Managed by Garfield (Mesh Lead). Weekly version updates, grouped to reduce PR noise.
# Security updates are always opened immediately regardless of schedule.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions-all:
        patterns: ["*"]
    open-pull-requests-limit: 5
